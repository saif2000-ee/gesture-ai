<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gesture AI</title>
</head>
<body>
<h2>Gesture AI Fingerspelling</h2>
<video id="video" width="320" height="240" autoplay></video>
<p>Detected Letter: <span id="letter">-</span></p>

<script>
const video = document.getElementById('video');
const letterEl = document.getElementById('letter');

// تشغيل الكاميرا
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream)
.catch(err => console.error(err));

// إرسال frames كل 500ms
setInterval(() => {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const img_data = canvas.toDataURL('image/jpeg');

    fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: img_data })
    })
    .then(res => res.json())
    .then(data => {
        letterEl.textContent = data.letter;
    });
}, 500);
</script>
</body>
</html>
