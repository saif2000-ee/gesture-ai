<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gesture AI</title>
<style>
    body { text-align: center; font-family: Arial; background: #f0f0f0; }
    video { border: 2px solid #4CAF50; }
    #letter { font-size: 48px; margin-top: 20px; }
</style>
</head>
<body>
<h1>Gesture AI</h1>
<video id="video" width="160" height="120" autoplay></video>
<div id="letter"></div>

<script>
const video = document.getElementById('video');
const letterDiv = document.getElementById('letter');

// الوصول للكاميرا
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => { video.srcObject = stream; });

function captureFrame() {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL('image/jpeg');
}

async function predict() {
    const img = captureFrame();
    const response = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: img })
    });
    const data = await response.json();
    letterDiv.textContent = data.letter;
}

// كل 500ms نرسل صورة للسيرفر
setInterval(predict, 500);
</script>
</body>
</html>
